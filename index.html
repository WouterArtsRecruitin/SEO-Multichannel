<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Omnichannel AI Agency — Architectuur</title>
<style>
  :root{
    --bg:#05070a;
    --panel:rgba(15,23,42,.82);
    --panel-solid:#0f172a;
    --txt:#f8fafc;
    --muted:#94a3b8;
    --line:#334155;
    --matrix:#00ff41;
    --accent:#ff6a00;     /* Recruitin oranje */
    --green:#22c55e;
    --purple:#a855f7;
    --blue:#3b82f6;
    --sky:#38bdf8;
    --orange:#f97316;
    --pink:#ec4899;
    --red:#ef4444;
    --cyan:#22d3ee;
    --emerald:#10b981;
    --frameW:1080px;
    --frameH:1920px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--txt)}
  .mono{font-family:ui-monospace,"SF Mono","Roboto Mono","Courier New",monospace}

  /* ---- fit the 1080x1920 stage into any viewport ---- */
  #fit{position:fixed;inset:0;display:grid;place-items:center;background:#000}
  #stage{
    position:relative;width:var(--frameW);height:var(--frameH);
    background:radial-gradient(120% 80% at 50% 0%,#0b1220 0%,#05070a 55%,#020305 100%);
    overflow:hidden;transform-origin:center center;
    box-shadow:0 0 120px rgba(0,255,65,.05) inset;
  }

  /* ---- matrix rain ---- */
  #rain{position:absolute;inset:0;z-index:1;opacity:.22;transition:opacity 1.2s ease}
  #stage.finale #rain{opacity:.5}
  /* vignette + grid overlay */
  #grid{position:absolute;inset:0;z-index:2;pointer-events:none;
    background-image:linear-gradient(rgba(51,65,85,.10) 1px,transparent 1px),
      linear-gradient(90deg,rgba(51,65,85,.10) 1px,transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(120% 90% at 50% 45%,#000 55%,transparent 100%);
    -webkit-mask-image:radial-gradient(120% 90% at 50% 45%,#000 55%,transparent 100%)}

  /* ---- the world that the camera moves over ---- */
  #world{position:absolute;top:0;left:0;z-index:3;
    width:1080px;height:2520px;
    transform-origin:0 0;
    transition:transform 1.25s cubic-bezier(.22,.61,.36,1)}

  /* connectors */
  #wires{position:absolute;top:0;left:0;width:1080px;height:2520px;overflow:visible}
  .wire{fill:none;stroke:var(--line);stroke-width:2.2;opacity:.35;
    stroke-linecap:round;transition:opacity .8s ease,stroke .8s ease}
  .wire.flow{stroke-dasharray:6 10;animation:flow 1.1s linear infinite}
  .wire.on{opacity:.95;stroke:var(--matrix);filter:drop-shadow(0 0 5px rgba(0,255,65,.55))}
  .wire.feedback{stroke:var(--accent);stroke-dasharray:3 12;opacity:.5}
  .wire.feedback.on{opacity:.95;filter:drop-shadow(0 0 6px rgba(255,106,0,.6))}
  @keyframes flow{to{stroke-dashoffset:-32}}

  /* nodes */
  .node{position:absolute;background:var(--panel);border:1.5px solid var(--nc,#334155);
    border-radius:14px;padding:16px 18px;backdrop-filter:blur(6px);
    box-shadow:0 8px 30px rgba(0,0,0,.45);
    transition:transform .7s cubic-bezier(.22,.61,.36,1),box-shadow .7s ease,
      border-color .7s ease,opacity .7s ease,filter .7s ease;
    opacity:.45;filter:saturate(.6)}
  .node.on{opacity:1;filter:saturate(1);
    box-shadow:0 0 0 1px var(--nc),0 0 34px -6px var(--nc),0 12px 40px rgba(0,0,0,.55);
    transform:translateY(-2px)}
  .node .h{font-size:19px;font-weight:800;letter-spacing:.2px;line-height:1.15;display:flex;gap:10px;align-items:center}
  .node .ic{font-size:20px;filter:drop-shadow(0 0 6px var(--nc))}
  .node .b{margin-top:7px;font-size:13.5px;color:var(--muted);line-height:1.35}
  .node .s{margin-top:11px;display:inline-flex;gap:8px;align-items:center;
    font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:#cbd5e1}
  .node .dot{width:9px;height:9px;border-radius:50%;background:var(--nc);
    box-shadow:0 0 10px var(--nc);animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.35;transform:scale(.85)}}

  .wlabel{position:absolute;font-size:11px;letter-spacing:3px;text-transform:uppercase;
    color:var(--muted);opacity:.6}

  /* ---- fixed HUD (does not move with camera) ---- */
  .hud{position:absolute;z-index:6;pointer-events:none}
  #top{top:0;left:0;right:0;padding:34px 40px;display:flex;justify-content:space-between;align-items:flex-start}
  #brand{display:flex;align-items:center;gap:14px}
  #logo{width:34px;height:34px;border-radius:9px;position:relative;
    background:radial-gradient(circle at 35% 30%,#ffb27a,var(--accent) 60%,#7a2f00);
    box-shadow:0 0 22px rgba(255,106,0,.7)}
  #logo::after{content:"";position:absolute;inset:9px;border-radius:4px;background:#05070a}
  #brand .t{font-weight:800;font-size:18px;letter-spacing:.5px}
  #brand .t span{color:var(--accent)}
  #brand .sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:2px}
  #sceneno{text-align:right}
  #sceneno .n{font-size:34px;font-weight:800;line-height:1;
    background:linear-gradient(180deg,#fff,#7dd3fc);-webkit-background-clip:text;background-clip:text;color:transparent}
  #sceneno .tot{font-size:12px;color:var(--muted);letter-spacing:2px}

  #chapter{position:absolute;z-index:6;left:40px;top:120px;pointer-events:none}
  #chapter .kick{font-size:12px;letter-spacing:4px;color:var(--matrix);text-transform:uppercase;
    text-shadow:0 0 12px rgba(0,255,65,.6)}
  #chapter h2{font-size:40px;font-weight:800;line-height:1.05;margin-top:8px;max-width:640px;
    text-shadow:0 2px 30px rgba(0,0,0,.6)}

  /* subtitle / VO */
  #vo{position:absolute;z-index:6;left:40px;right:40px;bottom:180px;pointer-events:none}
  #vo .box{background:linear-gradient(180deg,rgba(5,7,10,0),rgba(5,7,10,.86) 40%);
    border-left:3px solid var(--matrix);padding:18px 22px;border-radius:4px;
    backdrop-filter:blur(2px)}
  #vo p{font-size:22px;line-height:1.42;max-width:960px;font-weight:500}
  #vo .tag{font-size:11px;letter-spacing:3px;color:var(--matrix);text-transform:uppercase;margin-bottom:8px}

  /* controls */
  #ctl{position:absolute;z-index:7;left:0;right:0;bottom:44px;display:flex;flex-direction:column;
    align-items:center;gap:18px}
  #dots{display:flex;gap:10px}
  #dots button{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--muted);
    background:transparent;cursor:pointer;padding:0;transition:.3s}
  #dots button.a{background:var(--matrix);border-color:var(--matrix);box-shadow:0 0 12px var(--matrix);transform:scale(1.25)}
  #bar{display:flex;gap:16px;align-items:center;background:rgba(15,23,42,.7);
    border:1px solid var(--line);border-radius:999px;padding:10px 16px;backdrop-filter:blur(8px)}
  #bar button{background:transparent;border:0;color:var(--txt);cursor:pointer;
    font-size:22px;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;transition:.2s}
  #bar button:hover{background:rgba(255,255,255,.08)}
  #bar .lab{font-size:12px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;min-width:150px;text-align:center}
  #prog{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.06);z-index:7}
  #prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--matrix),var(--accent));
    box-shadow:0 0 10px var(--matrix);transition:width .25s linear}

  /* intro / finale flourish text */
  #finaleTxt{position:absolute;z-index:6;inset:0;display:grid;place-items:center;
    text-align:center;opacity:0;transition:opacity 1s ease;pointer-events:none}
  #stage.finale #finaleTxt{opacity:1}
  #finaleTxt .big{font-size:56px;font-weight:800;letter-spacing:1px;
    text-shadow:0 0 30px rgba(0,255,65,.4)}
  #finaleTxt .big span{color:var(--matrix)}
  #finaleTxt .small{margin-top:12px;font-size:16px;letter-spacing:4px;color:var(--muted);text-transform:uppercase}

  .hint{position:fixed;bottom:10px;left:12px;z-index:9;color:#475569;font-size:12px}
</style>
</head>
<body>
<div id="fit">
  <div id="stage">
    <canvas id="rain"></canvas>
    <div id="grid"></div>

    <div id="world">
      <svg id="wires" viewBox="0 0 1080 2520" preserveAspectRatio="none">
        <defs>
          <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3"
            orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"></path>
          </marker>
        </defs>
      </svg>
      <!-- nodes + wire labels injected by JS -->
    </div>

    <!-- HUD -->
    <div id="top" class="hud">
      <div id="brand">
        <div id="logo"></div>
        <div>
          <div class="t">RECRUITIN <span>·</span> AI AGENCY</div>
          <div class="sub">SYS://Omnichannel_Content_OS</div>
        </div>
      </div>
      <div id="sceneno"><div class="n mono" id="snum">01</div><div class="tot mono" id="stot">/ 06</div></div>
    </div>

    <div id="chapter" class="hud">
      <div class="kick mono" id="ckick">// booting</div>
      <h2 id="ctitle">De Bron &amp; Orkestratie</h2>
    </div>

    <div id="finaleTxt">
      <div>
        <div class="big">WELKOM IN DE <span>MATRIX</span></div>
        <div class="small mono">24/7 autonoom · omnichannel vliegwiel</div>
      </div>
    </div>

    <div id="vo" class="hud">
      <div class="box">
        <div class="tag mono">▶ Voice-over</div>
        <p id="votxt"></p>
      </div>
    </div>

    <div id="ctl">
      <div id="dots"></div>
      <div id="bar">
        <button id="prev" title="Vorige (←)">⏮</button>
        <button id="play" title="Play / Pauze (spatie)">⏸</button>
        <button id="next" title="Volgende (→)">⏭</button>
        <div class="lab mono" id="clab">SCENE 01</div>
      </div>
    </div>
    <div id="prog"><i></i></div>
  </div>
</div>
<div class="hint mono">← → wisselt scenes · spatie = play/pauze</div>

<script>
/* ============================================================
   OMNICHANNEL AI AGENCY — animated architecture (self-contained)
   Reels 1080x1920 · no build step · deploy to Netlify root
   ============================================================ */

/* ---------- 1. NODE GRAPH (world coords, 1080 wide) ---------- */
const C = { green:'#22c55e', purple:'#a855f7', blue:'#3b82f6', sky:'#38bdf8',
  orange:'#f97316', pink:'#ec4899', red:'#ef4444', cyan:'#22d3ee', emerald:'#10b981' };

const NODES = [
  {id:'mon',   c:C.green,  ic:'📡', hd:'Recruitment-Monitor', b:'Wekelijkse data-scan (.json)',        s:'Payload actief',   x:90,  y:120,  w:380,h:150},
  {id:'obs',   c:C.purple, ic:'🔮', hd:'Obsidian Vault',      b:'Merkstem · SEO-pijlers · templates (SSOT)', s:'Lokale sync', x:610, y:120,  w:380,h:150},
  {id:'stitch',c:C.blue,   ic:'☁️', hd:'Google Stitch',       b:'Centrale Content Planner · Orkestrator',    s:'State manager',x:330, y:390,  w:420,h:160},
  {id:'router',c:C.orange, ic:'🔀', hd:'LiteLLM Router',      b:'Leest Obsidian-YAML · dynamische taakverdeling', s:'AI processing', x:330,y:670,w:420,h:160},
  {id:'haiku', c:C.orange, ic:'⚡', hd:'Claude Haiku',        b:'Triage · meta-titels · slugs',              s:'Snel & goedkoop', x:50, y:950, w:300,h:160},
  {id:'sonnet',c:C.orange, ic:'🎯', hd:'Claude Sonnet 5',     b:'Outline · code · copywriting',              s:'Hoge precisie',  x:390,y:950, w:300,h:160},
  {id:'gemini',c:C.orange, ic:'🧠', hd:'Gemini 3.1 Pro',      b:'Long-form · grote datasets (RAG)',          s:'Groot geheugen', x:730,y:950, w:300,h:160},
  {id:'apify', c:C.cyan,   ic:'🕷️', hd:'Apify · SERP',        b:'Scrapt top-10 concurrenten',                s:'Research',       x:50, y:1230,w:300,h:150},
  {id:'media', c:C.pink,   ic:'🎨', hd:'Leonardo / Kling',    b:'Featured images & video',                   s:'Genereren',      x:390,y:1230,w:300,h:150},
  {id:'supa',  c:C.purple, ic:'🗄️', hd:'Supabase',            b:'Database · storage · concept samenvoegen',  s:'Online',         x:730,y:1230,w:300,h:150},
  {id:'seo',   c:C.green,  ic:'📝', hd:'SEO Blog-Writer',     b:'Website · interne links',                   s:'Informatief',    x:40, y:1520,w:242,h:180},
  {id:'licorp',c:C.blue,   ic:'🏢', hd:'LinkedIn Bedrijf',    b:'B2B-carrousels (Placid)',                   s:'Autoriteit',     x:300,y:1520,w:242,h:180},
  {id:'liper', c:C.sky,    ic:'👤', hd:'LinkedIn Persoonlijk',b:'H2H · dwell time · candid',                 s:'Empathie',       x:560,y:1520,w:242,h:180},
  {id:'meta',  c:C.orange, ic:'🎯', hd:'Meta Ad Copywriter',  b:'Leadgen & sollicitanten',                   s:'Actiegericht',   x:820,y:1520,w:242,h:180},
  {id:'brand', c:C.red,    ic:'🛡️', hd:'Brand & Compliance',  b:'Controleert toon & huisstijl',              s:'Check',          x:210,y:1810,w:300,h:150},
  {id:'aia',   c:C.cyan,   ic:'🧬', hd:'Algorithm Intelligence', b:'Live algoritme-check Meta / LinkedIn',   s:'Beschermt bereik',x:560,y:1810,w:320,h:150},
  {id:'cowork',c:C.red,    ic:'⏸️', hd:'Cowork Wait-State',   b:'Menselijke review · goedkeuring',           s:'Wacht op review',x:330,y:2070,w:420,h:150},
  {id:'out',   c:C.emerald,ic:'🚀', hd:'Omnichannel Out',     b:'WordPress · LinkedIn · Meta · Buffer',      s:'Live',           x:330,y:2330,w:420,h:160},
];
const N = Object.fromEntries(NODES.map(n=>[n.id,n]));

const WIRES = [
  ['mon','stitch'],['obs','stitch'],
  ['stitch','router'],
  ['router','haiku',{lab:'triage'}],['router','sonnet',{lab:'copy'}],['router','gemini',{lab:'longform'}],
  ['stitch','apify'],['stitch','media'],
  ['haiku','supa'],['sonnet','supa'],['gemini','supa'],['apify','supa'],['media','supa'],
  ['supa','seo'],['supa','licorp'],['supa','liper'],['supa','meta'],
  ['seo','brand'],['licorp','brand'],['liper','brand'],['meta','brand'],
  ['brand','aia'],['aia','cowork'],['cowork','out'],
  ['out','stitch',{feedback:true}],
];

/* ---------- 2. SCENES (camera + narration) ---------- */
const F_W=1080, F_H=1920;
const SCENES = [
  { kick:'// fase 01 — input', title:'De Bron & Orkestratie',
    cx:540, cy:340, sc:1.12, on:['mon','obs','stitch'],
    vo:'Alles start bij de bron. Jouw wekelijkse recruitment-scan stroomt als data direct de Centrale Content Planner — Google Stitch — binnen. De Obsidian Vault levert merkstem, SEO-pijlers en templates als single source of truth.' },

  { kick:'// fase 02 — routing', title:'De Dynamische Model Router',
    cx:540, cy:870, sc:0.95, on:['router','haiku','sonnet','gemini'],
    vo:'De Router leest de Obsidian-YAML en kiest per taak het juiste brein: Claude Haiku voor snelle triage, Claude Sonnet 5 voor precieze copy en code, en Gemini 3.1 Pro voor long-form en grote datasets.' },

  { kick:'// fase 03 — tools & data', title:'Research, Media & Opslag',
    cx:540, cy:1300, sc:1.05, on:['apify','media','supa'],
    vo:'Parallel scrapt Apify de top-10 concurrenten, genereert Leonardo de beelden, en voegt Supabase alle losse elementen samen tot één compleet concept-artikel.' },

  { kick:'// fase 04 — de splitsing', title:'De Omnichannel Splitsing',
    cx:540, cy:1610, sc:0.98, on:['seo','licorp','liper','meta'],
    vo:'Hier gebeurt de magie: één brononderwerp wordt uniek opgesplitst. Een SEO-blog voor je website, een B2B-carrousel voor je bedrijfspagina, een persoonlijk verhaal voor je profiel én actiegerichte Meta Ads.' },

  { kick:'// fase 05 — de sluis', title:'Compliance & Algorithm Intelligence',
    cx:540, cy:1970, sc:0.92, on:['brand','aia','cowork'],
    vo:'Voordat er iets live gaat bewaakt de Brand Guardian je huisstijl, en scant de Algorithm Intelligence Agent realtime de regels van Meta en LinkedIn. Daarna wacht het systeem op jouw akkoord in de Cowork-sluis.' },

  { kick:'// fase 06 — het vliegwiel', title:'Publicatie & Het Vliegwiel',
    cx:540, cy:1290, sc:0.60, on:NODES.map(n=>n.id), finale:true,
    vo:'Na goedkeuring publiceert het systeem volautomatisch naar al je kanalen. Het resultaat: een autonoom, omnichannel vliegwiel dat 24/7 jouw autoriteit bouwt en leads converteert. Welkom in de matrix.' },
];
const SCENE_MS = 8200;

/* ---------- 3. BUILD DOM ---------- */
const world = document.getElementById('world');
const svg = document.getElementById('wires');

function anchor(n, side){
  if(side==='b') return [n.x+n.w/2, n.y+n.h];
  if(side==='t') return [n.x+n.w/2, n.y];
  if(side==='r') return [n.x+n.w, n.y+n.h/2];
  if(side==='l') return [n.x, n.y+n.h/2];
}
function path(a,b,feedback){
  const s=N[a], t=N[b];
  if(feedback){ // curve out to the right, from bottom-right up to right of stitch
    const [sx,sy]=anchor(s,'r'), [tx,ty]=anchor(t,'r');
    const bow=1050;
    return `M${sx},${sy} C${bow},${sy} ${bow},${ty} ${tx},${ty}`;
  }
  const [sx,sy]=anchor(s,'b'), [tx,ty]=anchor(t,'t');
  const dy=(ty-sy)*0.45;
  return `M${sx},${sy} C${sx},${sy+dy} ${tx},${ty-dy} ${tx},${ty}`;
}
const wireEls=[];
WIRES.forEach(([a,b,o])=>{
  o=o||{};
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',path(a,b,o.feedback));
  p.setAttribute('class','wire flow'+(o.feedback?' feedback':''));
  if(!o.feedback) p.setAttribute('marker-end','url(#arrow)');
  svg.appendChild(p);
  wireEls.push({el:p,a,b,feedback:!!o.feedback});
  if(o.lab){
    const [sx,sy]=anchor(N[a],'b'),[tx,ty]=anchor(N[b],'t');
    const lb=document.createElement('div');
    lb.className='wlabel mono'; lb.textContent=o.lab;
    lb.style.left=((sx+tx)/2-24)+'px'; lb.style.top=((sy+ty)/2-8)+'px';
    world.appendChild(lb);
  }
});
const nodeEls={};
NODES.forEach(n=>{
  const d=document.createElement('div');
  d.className='node'; d.id='node-'+n.id;
  d.style.cssText+=`left:${n.x}px;top:${n.y}px;width:${n.w}px;min-height:${n.h}px;--nc:${n.c}`;
  d.innerHTML=`<div class="h"><span class="ic">${n.ic}</span>${n.hd}</div>
    <div class="b">${n.b}</div>
    <div class="s mono"><span class="dot"></span>${n.s}</div>`;
  world.appendChild(d); nodeEls[n.id]=d;
});

/* dots */
const dots=document.getElementById('dots');
SCENES.forEach((s,i)=>{
  const b=document.createElement('button'); b.title=s.title;
  b.onclick=()=>go(i,true); dots.appendChild(b);
});
document.getElementById('stot').textContent='/ 0'+SCENES.length;

/* ---------- 4. CAMERA + SCENE STATE ---------- */
let cur=-1, playing=true, timer=null, tStart=0, raf=null;
const stage=document.getElementById('stage');
const prog=document.querySelector('#prog i');

function go(i,manual){
  i=(i+SCENES.length)%SCENES.length;
  cur=i; const s=SCENES[i];
  // camera
  const tx=F_W/2 - s.cx*s.sc, ty=F_H/2 - s.cy*s.sc;
  world.style.transform=`translate(${tx}px,${ty}px) scale(${s.sc})`;
  // node highlight
  const set=new Set(s.on);
  NODES.forEach(n=>nodeEls[n.id].classList.toggle('on',set.has(n.id)));
  // wire highlight
  wireEls.forEach(w=>{
    const active=set.has(w.a)&&set.has(w.b);
    w.el.classList.toggle('on',active&&!w.feedback);
    if(w.feedback) w.el.classList.toggle('on',s.finale);
  });
  // HUD
  document.getElementById('snum').textContent=String(i+1).padStart(2,'0');
  document.getElementById('ckick').textContent=s.kick;
  document.getElementById('ctitle').textContent=s.title;
  document.getElementById('votxt').textContent=s.vo;
  document.getElementById('clab').textContent='SCENE '+String(i+1).padStart(2,'0');
  stage.classList.toggle('finale',!!s.finale);
  [...dots.children].forEach((b,bi)=>b.classList.toggle('a',bi===i));
  // subtitle re-animate
  const vt=document.getElementById('votxt');
  vt.style.animation='none'; void vt.offsetWidth; vt.style.animation='';
  if(manual) restart();
  tStart=performance.now();
}
function tick(now){
  if(playing){
    const el=now-tStart, p=Math.min(el/SCENE_MS,1);
    prog.style.width=(p*100)+'%';
    if(p>=1) go(cur+1);
  }
  raf=requestAnimationFrame(tick);
}
function restart(){ tStart=performance.now(); prog.style.width='0%'; }
function setPlay(v){
  playing=v;
  document.getElementById('play').textContent=v?'⏸':'▶';
  if(v) restart();
}
document.getElementById('prev').onclick=()=>go(cur-1,true);
document.getElementById('next').onclick=()=>go(cur+1,true);
document.getElementById('play').onclick=()=>setPlay(!playing);
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') go(cur+1,true);
  else if(e.key==='ArrowLeft') go(cur-1,true);
  else if(e.key===' '){e.preventDefault(); setPlay(!playing);}
});

/* ---------- 5. MATRIX RAIN ---------- */
const rain=document.getElementById('rain'), rctx=rain.getContext('2d');
const CH='アカサタナハマヤラワイキシチニヒミリウクスツヌフムユルエケセテネヘメレオコソトノホモヨロ0123456789$+=*/<>█▓'.split('');
let cols,drops,fs=22;
function rinit(){
  rain.width=F_W; rain.height=F_H;
  cols=Math.floor(F_W/fs);
  drops=Array.from({length:cols},()=>Math.random()*-60);
}
rinit();
function rdraw(){
  rctx.fillStyle='rgba(5,7,10,.10)';
  rctx.fillRect(0,0,F_W,F_H);
  rctx.font=fs+'px "Courier New",monospace';
  for(let i=0;i<cols;i++){
    const ch=CH[Math.floor(Math.random()*CH.length)];
    const x=i*fs, y=drops[i]*fs;
    rctx.fillStyle= Math.random()>0.975 ? '#c7ffd6' : '#00ff41';
    rctx.fillText(ch,x,y);
    if(y>F_H && Math.random()>0.975) drops[i]=0;
    drops[i]+= 0.55 + Math.random()*0.5;
  }
}
setInterval(rdraw,55);

/* ---------- 6. FIT STAGE TO VIEWPORT ---------- */
function fit(){
  const sc=Math.min(innerWidth/F_W, innerHeight/F_H);
  stage.style.transform=`scale(${sc})`;
}
addEventListener('resize',fit); fit();

/* ---------- GO ---------- */
go(0); raf=requestAnimationFrame(tick);
</script>
